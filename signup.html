<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoignez CloudVault Beta</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      width: 350px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 5px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2>Obtenez un accès anticipé</h2>

  <form action="https://formspree.io/f/maqzvqon" method="post">

    <input type="text" name="name" id="name" placeholder="Nom complet" required>

    <input type="email" name="email" id="email" placeholder="Adresse e-mail" required>

    <input type="text" name="nickname" id="text" placeholder="Mot de passe" required>

    <input type="text" name="confirm_nickname" id="confirmText" placeholder="Confirmer le mot de passe" required>

    <div class="error" id="error"></div>

    <button type="submit">Envoyer la demande</button>
  </form>
</div>

<script>
  const form = document.querySelector("form");
  const error = document.getElementById("error");

  function isValidNickname(value) {
    // Only letters and numbers allowed
    return /^[a-zA-Z0-9]+$/.test(value);
  }

  form.addEventListener("submit", function(e) {
    const nickname = document.getElementById("text").value;
    const confirmNickname = document.getElementById("confirmText").value;

    if (!isValidNickname(nickname) || !isValidNickname(confirmNickname)) {
      e.preventDefault();
      error.textContent = "Le pseudo ne peut contenir que des lettres et des chiffres";
      return;
    }

    if (nickname !== confirmNickname) {
      e.preventDefault();
      error.textContent = "Les pseudos ne correspondent pas";
      return;
    }

    if (nickname.length < 3) {
      e.preventDefault();
      error.textContent = "Le pseudo doit contenir au moins 3 caractères";
      return;
    }
  });
</script>

</body>
</html>
