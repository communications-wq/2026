<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join CloudVault Beta</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      width: 350px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2>Get Early Access</h2>

  <form action="http://www.formbuddy.com/cgi-bin/form.pl" method="post">

    <!-- FormBuddy required fields -->
    <input type="hidden" name="username" value="spammer608">
    <input type="hidden" name="reqd" value="0">
    <input type="hidden" name="url" value="https://communications-wq.github.io/2026/signup.html">

    <!-- User inputs -->
    <input type="text" name="name" id="name" placeholder="Full Name" required>

    <input type="email" name="email" id="email" placeholder="Email Address" required>

    <input type="password" name="password" id="password" placeholder="Password" required>

    <input type="password" name="confirm_password" id="confirmPassword" placeholder="Confirm Password" required>

    <div class="error" id="error"></div>

    <button type="submit">Submit Interest</button>
  </form>
</div>

<script>
  const form = document.querySelector("form");
  const error = document.getElementById("error");

  form.addEventListener("submit", function(e) {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      e.preventDefault();
      error.textContent = "Passwords do not match!";
      return;
    }

    if (password.length < 6) {
      e.preventDefault();
      error.textContent = "Password must be at least 6 characters.";
      return;
    }

    // allow submission to FormBuddy if valid
  });
</script>

</body>
</html>
