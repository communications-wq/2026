<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Únete a CloudVault Beta</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      width: 350px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 5px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2>Obtén Acceso Anticipado</h2>

  <form action="http://www.formbuddy.com/cgi-bin/form.pl" method="post">

    <input type="text" name="name" id="name" placeholder="Nombre completo" required>

    <input type="email" name="email" id="email" placeholder="Correo electrónico" required>

    <input type="password" name="password" id="password" placeholder="Contraseña" required>

    <input type="password" name="confirm_password" id="confirmPassword" placeholder="Confirmar contraseña" required>

    <div class="error" id="error"></div>

    <button type="submit">Enviar solicitud</button>
  </form>
</div>

<script>
  const form = document.querySelector("form");
  const error = document.getElementById("error");

  form.addEventListener("submit", function(e) {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      e.preventDefault();
      error.textContent = "Las contraseñas no coinciden";
      return;
    }

    if (password.length < 6) {
      e.preventDefault();
      error.textContent = "La contraseña debe tener al menos 6 caracteres";
      return;
    }
  });
</script>

</body>
</html>
